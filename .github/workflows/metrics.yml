name: Metrics

on:
  workflow_dispatch:
  schedule: [{cron: "0 0 * * *"}]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PatriciaGheller
          template: markdown
          filename: github-metrics.svg
          committer_message: "Atualiza métricas"
          config_timezone: America/Sao_Paulo

          base: header, activity, community, repositories

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used, recently-used, percentage

          plugin_commits: yes
          plugin_commits_authoring: PatriciaGheller <patricia.gheller.1985@gmail.com>

          plugin_stars: yes
          plugin_followers: yes
          plugin_reactions: yes
          plugin_lines: yes

          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed

          plugin_calendar: yes
          plugin_calendar_limit: 1

          plugin_topics: yes
          plugin_topics_limit: 12
