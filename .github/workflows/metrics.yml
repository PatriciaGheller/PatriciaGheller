name: Metrics

on:
  workflow_dispatch:
  schedule: [{cron: "0 0 * * *"}]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PatriciaGheller
          template: classic
          base: header, repositories
          config_timezone: America/Sao_Paulo
          filename: metrics.svg   
